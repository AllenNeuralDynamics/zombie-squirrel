source = { editable = "." }
dependencies = [
    { name = "aind-data-access-api", extra = ["docdb"] },
    { name = "boto3" },
    { name = "duckdb" },
    { name = "pandas" },
    { name = "pyarrow" },
    { name = "s3fs" },
    { name = "zarr" },
]

[package.dev-dependencies]
dev = [
    { name = "coverage" },
    { name = "furo" },
    { name = "interrogate" },
    { name = "numpy" },
    { name = "pre-commit" },
    { name = "ruff" },
    { name = "sphinx" },
]

[package.metadata]
requires-dist = [
    { name = "aind-data-access-api", extras = ["docdb"] },
    { name = "boto3" },
    { name = "duckdb" },
    { name = "pandas" },
    { name = "pyarrow" },
    { name = "s3fs" },
    { name = "zarr" },
]

[package.metadata.requires-dev]
dev = [
    { name = "coverage" },
    { name = "furo" },
    { name = "interrogate" },
    { name = "numpy" },
    { name = "pre-commit" },
    { name = "ruff" },
    { name = "sphinx" },
]
